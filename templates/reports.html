{% extends "index.html" %}

{% block content %}

<div class="container-fluid">
    <h2 class="mb-4">
        <i class="bi bi-file-earmark-bar-graph-fill"></i>
        Reports
    </h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card shadow report-card">
                <div class="card-body text-center">
                    <i class="bi bi-people-fill display-4 text-primary"></i>
                    <h4 class="mt-3">
                        Employee Report
                    </h4>
                    <a href="/employee_report"
                       class="btn btn-primary mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card">
                <div class="card-body text-center">
                    <i class="bi bi-laptop display-4 text-success"></i>
                    <h4 class="mt-3">
                        Asset Report
                    </h4>
                    <a href="/asset_report"
                       class="btn btn-success mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card">
                <div class="card-body text-center">
                    <i class="bi bi-exclamation-circle display-4 text-warning"></i>
                    <h4 class="mt-3">
                        Complaint Report
                    </h4>
                    <a href="/complaint_report"
                       class="btn btn-warning mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card">
                <div class="card-body text-center">
                    <i class="bi bi-tools display-4 text-danger"></i>
                    <h4 class="mt-3">
                        Maintenance Report
                    </h4>
                    <a href="/maintenance_report"
                       class="btn btn-danger mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
