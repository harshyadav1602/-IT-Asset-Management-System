{% extends "index.html" %}

{% block content %}

<div class="container-fluid">
    <h2 class="mb-4">
        <i class="bi bi-file-earmark-bar-graph-fill"></i>
        Reports
    </h2>
    <div class="row">
        <div class="col-md-3">
            <div class="card shadow report-card employee-card">
                <div class="card-body text-center">
                    <div class="report-icon employee-icon">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <h4 class="mt-3">
                        Employee Report
                    </h4>
                    <a href="/employee_report"
                       class="btn btn-primary mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card asset-card">
                <div class="card-body text-center">
                    <div class="report-icon asset-icon">
                        <i class="bi bi-laptop"></i>
                    </div>
                    <h4 class="mt-3">
                        Asset Report
                    </h4>
                    <a href="/asset_report"
                       class="btn btn-success mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card complaint-card">
                <div class="card-body text-center">
                    <div class="report-icon complaint-icon">
                        <i class="bi bi-exclamation-circle"></i>
                    </div>
                    <h4 class="mt-3">
                        Complaint Report
                    </h4>
                    <a href="/complaint_report"
                       class="btn btn-warning mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow report-card maintenance-card">
                <div class="card-body text-center">
                    <div class="report-icon maintenance-icon">
                        <i class="bi bi-tools"></i>
                    </div>
                    <h4 class="mt-3">
                        Maintenance Report
                    </h4>
                    <a href="/maintenance_report"
                       class="btn btn-danger mt-3">
                        View Report
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
