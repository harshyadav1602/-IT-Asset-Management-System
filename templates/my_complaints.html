{% extends "index.html" %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">My Complaints</h2>

    <table class="table table-bordered table-hover">

        <thead>
            <tr>
                <th>Complaint ID</th>
                <th>Asset ID</th>
                <th>Issue</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

        {% for complaint in complaints %}

        <tr>

            <td>{{ complaint[0] }}</td>
            <td>{{ complaint[2] }}</td>
            <td>{{ complaint[3] }}</td>
            <td>{{ complaint[4] }}</td>
            <td>{{ complaint[5] }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
