{% extends "index.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Add Maintenance</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Maintenance ID</label>
                    <input type="text" name="maintenance_id" class="form-control" value="{{ maintenance[0] if maintenance else '' }}"
       {% if edit %}readonly{% endif %} required>
                </div>

                <div class="mb-3">
                    <label>Asset ID</label>
                    <input type="text" name="asset_id"class="form-control" value="{{ maintenance[1] if maintenance else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Engineer Name</label>
                    <input type="text" name="engineer_name"
                           class="form-control" value="{{ maintenance[2] if maintenance else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Maintenance Date</label>
                    <input type="date" name="maintenance_date"
                           class="form-control" value="{{ maintenance[3] if maintenance else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Cost</label>
                    <input type="number" step="0.01"
                           name="cost"
                           class="form-control" value="{{ maintenance[4] if maintenance else '' }}" required>
                </div>

                <div class="mb-3">
                    <label>Remarks</label>
                    <textarea name="remarks"
                              class="form-control"
                              rows="3">{{ maintenance[5] if maintenance else '' }}</textarea>
                </div>

                <button class="btn btn-success">
                    {% if edit %}
                        Update Maintenance
                    {% else %}
                        Save Maintenance
                    {% endif %}
                </button>

                <a href="/maintenance"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
