{% extends "index.html" %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">
        My Assets
    </h2>

    <table class="table table-bordered table-hover">

        <thead>

        <tr>

            <th>Asset ID</th>
            <th>Asset Name</th>
            <th>Category</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Status</th>

        </tr>

        </thead>

        <tbody>

        {% for asset in assets %}

        <tr>

            <td>{{ asset[0] }}</td>
            <td>{{ asset[1] }}</td>
            <td>{{ asset[2] }}</td>
            <td>{{ asset[3] }}</td>
            <td>{{ asset[4] }}</td>
            <td>{{ asset[5] }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
