{% extends "index.html" %}

{% block content %}

<div class="container mt-4">

    <!-- Profile Photo -->

    <div class="text-center mb-4">

        {% if admin[5] %}
        <img src="{{ url_for('static',
            filename='uploads/profile/' + admin[5]) }}"
            class="rounded-circle border border-4 border-primary shadow"
            width="150"
            height="150"
            style="object-fit:cover;">
        {% else %}
        <i class="bi bi-person-circle"
           style="font-size:130px;color:#0d6efd;"></i>
        {% endif %}

        <h1 class="mt-3">
            {{ admin[0] }}
        </h1>

    </div>

    <div class="card shadow-lg rounded-4">

        <div class="card-header bg-primary text-white">

            <h2>
                My Profile
            </h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">

                <tr>
                    <th width="30%">Full Name</th>
                    <td>{{ admin[0] }}</td>
                </tr>

                <tr>
                    <th>Username</th>
                    <td>{{ admin[1] }}</td>
                </tr>

                <tr>
                    <th>Role</th>
                    <td>{{ admin[2] }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ admin[3] }}</td>
                </tr>

                <tr>
                    <th>Phone Number</th>
                    <td>{{ admin[4] }}</td>
                </tr>

            </table>
            <br>
            <a href="/edit-admin-profile"
               class="btn btn-primary">

                <i class="bi bi-pencil-square"></i>

                Edit Profile

            </a>

        </div>

    </div>

</div>

{% endblock %}
