{% extends "index.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Add Employee</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Employee ID</label>
                    <input type="text" class="form-control" name="employee_id" value="{{ employee[0] if employee else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Employee Name</label>
                    <input type="text" class="form-control" name="employee_name" value="{{ employee[1] if employee else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department ID</label>
                    <input type="text" class="form-control" name="department_id" value="{{ employee[2] if employee else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Designation</label>
                    <input type="text" class="form-control" name="designation" value="{{ employee[3] if employee else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" value="{{ employee[4] if employee else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" name="phone" value="{{ employee[5] if employee else '' }}" required>
                </div>

                <button type="submit" class="btn btn-success">
                    {% if edit %}
                    Update Employee
                    {% else %}
                    Save Employee
                    {% endif %}
                </button>

                <a href="/employees" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
