{% extends "index.html" %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>My Profile</h3>
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th width="30%">Employee ID</th>
                    <td>{{ employee[0] }}</td>
                </tr>

                <tr>
                    <th>Name</th>
                    <td>{{ employee[1] }}</td>
                </tr>

                <tr>
                    <th>Department</th>
                    <td>{{ employee[2] }}</td>
                </tr>

                <tr>
                    <th>Designation</th>
                    <td>{{ employee[3] }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ employee[4] }}</td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td>{{ employee[5] }}</td>
                </tr>

            </table>

            <div class="mt-3">

                <a href="/edit-my-profile"
                class="btn btn-primary">

                    <i class="bi bi-pencil-square"></i>
                    Edit Profile

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
