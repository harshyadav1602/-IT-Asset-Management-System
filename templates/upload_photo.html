{% extends "index.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Upload Profile Photo</h3>

</div>

<div class="card-body">

<form method="POST"
      enctype="multipart/form-data">

<input
type="file"
name="photo"
class="form-control"
accept="image/*"
required>

<br>

<button class="btn btn-primary">

Upload

</button>

</form>

</div>

</div>

</div>

{% endblock %}
