<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Verify OTP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="forgot-password-page">
    <canvas id="forgot-bg"></canvas>
    <div class="forgot-container">

        <div class="card auth-card otp-card">

            <div class="card-header login-header">
                <h3 class="text-center auth-title">
                    <i class="bi bi-patch-check-fill"></i>
                      Verify OTP
                </h3>
            </div>

            <div class="card-body">

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Enter OTP</label>

                        <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit OTP" required>
                    </div>
                    <button class="btn login-btn w-100">
                        Verify OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/forgot-3d.js') }}"></script>
</body>

</html>
